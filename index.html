<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebApp Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>La mia prima webapp online</h1>
    <p>Sto imparando deploy, GitHub, Netlify e database.</p>

    <section class="card">
      <h2>Aggiungi contatto</h2>

      <label for="name">Nome</label>
      <input id="name" type="text" placeholder="Es. Mario Rossi" />

      <label for="email">Email</label>
      <input id="email" type="email" placeholder="Es. mario@email.com" />

      <label for="note">Note</label>
      <textarea id="note" placeholder="Scrivi una nota"></textarea>

      <button id="saveContact" type="button">Salva contatto</button>
      <p id="statusMessage"></p>
    </section>

    <section class="card">
      <h2>Contatti salvati</h2>
      <ul id="contactsList"></ul>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
